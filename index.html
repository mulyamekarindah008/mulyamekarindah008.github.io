<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Digital RW 08</title>
    <meta http-equiv="refresh" content="4; url=https://sites.google.com/view/perum-mulyamekar-indah-mmi">
    
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #2e3b23 0%, #1a2313 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f1c40f; /* Warna Emas */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        .frame {
            border: 3px double #f1c40f;
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
            background: rgba(0,0,0,0.4);
            max-width: 80%;
        }
        .typing {
            overflow: hidden;
            border-right: .15em solid #f1c40f;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 2.5s steps(30, end), blink-caret .5s step-end infinite;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .sub-text {
            color: white;
            margin-top: 20px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeIn 1s forwards 2.5s;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #f1c40f } }
        @keyframes fadeIn { to { opacity: 1 } }
    </style>
</head>
<body>
    <div class="frame">
        <div class="typing">MENYAMBUNGKAN KE PORTAL RW 08...</div>
        <div class="sub-text">SISTEM INFORMASI DIGITAL MULYAMEKAR INDAH</div>
        <div style="margin-top: 30px;">
             <small style="color: #aaa;">Mohon Tunggu Sebentar...</small>
        </div>
    </div>
</body>
</html>
