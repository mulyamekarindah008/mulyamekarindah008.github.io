<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Digital RW 08</title>
    <meta http-equiv="refresh" content="3; url=https://sites.google.com/view/perum-mulyamekar-indah-mmi">
    
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #2e3b23 0%, #1a2313 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f1c40f; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            padding: 20px; /* Jarak aman biar gak nempel pinggir HP */
        }
        .frame {
            border: 2px double #f1c40f;
            padding: 30px 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
            background: rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px; /* Biar pas di layar HP */
        }
        .typing {
            font-size: 16px; /* Ukuran pas buat HP */
            font-weight: bold;
            text-transform: uppercase;
            white-space: normal; /* Biar tulisan bisa turun ke bawah kalo kepanjangan */
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .sub-text {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            border-top: 1px solid #f1c40f;
            padding-top: 15px;
        }
        .loader-bar {
            width: 100%;
            height: 4px;
            background: #1a2313;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .loader-progress {
            width: 0;
            height: 100%;
            background: #f1c40f;
            animation: loading 3s linear forwards;
        }
        @keyframes loading { to { width: 100% } }
    </style>
</head>
<body>
    <div class="frame">
        <div class="typing">MENGHUBUNGKAN KE<br>PORTAL DIGITAL RW 08</div>
        <div class="sub-text">MULYAMEKAR INDAH (MMI)</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>
</body>
</html>
